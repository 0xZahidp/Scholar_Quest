<!doctype html>
<html>
  <body style="margin:0;background:#070711;color:#f8fafc;font-family:Arial,Helvetica,sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#070711;padding:32px 16px;">
      <tr><td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;background:#111123;border:1px solid #2b2d42;border-radius:22px;overflow:hidden;">
          <tr><td style="padding:32px;background:linear-gradient(135deg,#6d5dfc,#10d7e2);">
            <div style="font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#eef2ff;">Security checkpoint</div>
            <h1 style="margin:12px 0 0;font-size:30px;line-height:1.15;color:#ffffff;">Verify this action</h1>
          </td></tr>
          <tr><td style="padding:32px;">
            <p style="margin:0 0 22px;color:#cbd5e1;font-size:16px;line-height:1.6;">Enter this code to continue with the sensitive account action.</p>
            <div style="padding:18px;border:1px solid #303249;border-radius:16px;background:#0b0b18;text-align:center;">
              <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#38bdf8;">Verification code</div>
              <div style="margin-top:10px;font-size:34px;letter-spacing:8px;font-weight:700;color:#ffffff;">{{ .Token }}</div>
            </div>
            <p style="margin:28px 0 0;color:#64748b;font-size:12px;line-height:1.6;">If you did not request this, review your account security.</p>
          </td></tr>
        </table>
      </td></tr>
    </table>
  </body>
</html>
